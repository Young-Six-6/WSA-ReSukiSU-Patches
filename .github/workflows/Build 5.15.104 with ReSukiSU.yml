name: Build WSA Kernel 5.15.104 (ReSukiSU)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        type: choice
        options:
          - x64
          - arm64
      create_release:
        description: "Create GitHub Release"
        required: false
        default: false
        type: boolean

env:
  KERNEL_TAG: android-lts/latte-2/5.15.104.4
  PATCH_REPO: Young-Six-6/WSA-ReSukiSU-Patches
  PATCH_BRANCH: main
  PATCH_DIR: 5.15.104

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout WSA kernel source
        uses: actions/checkout@v4
        with:
          repository: microsoft/WSA-Linux-Kernel
          ref: ${{ env.KERNEL_TAG }}
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            flex \
            libelf-dev \
            libssl-dev \
            libncurses-dev \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            clang \
            lld \
            llvm \
            curl \
            git

      - name: Verify toolchain
        run: |
          clang --version
          ld.lld --version
          llvm-ar --version
          llvm-objdump --version

      - name: Clone ReSukiSU patch repository
        run: |
          git clone --depth=1 --branch ${{ env.PATCH_BRANCH }} \
            https://github.com/${{ env.PATCH_REPO }}.git \
            ../patch-repo

      - name: Validate & apply all kernel patches
        run: |
          set -e
          PATCH_ABS_DIR="../patch-repo/${{ env.PATCH_DIR }}"

          echo "===== Step 1: Dry-run all patches (no file changes) ====="
          for patch_file in "$PATCH_ABS_DIR"/00*.patch; do
            patch_name=$(basename "$patch_file")
            echo "Validating: $patch_name"
            if ! patch -p0 --dry-run --no-backup-if-mismatch -i "$patch_file"; then
              echo "Error VALIDATION FAILED: $patch_name has conflicts / rejects"
              exit 1
            fi
          done

          echo ""
          echo "===== Step 2: Apply all patches in order ====="
          for patch_file in "$PATCH_ABS_DIR"/00*.patch; do
            patch_name=$(basename "$patch_file")
            echo "Applying: $patch_name"
            patch -p0 --no-backup-if-mismatch -i "$patch_file"
          done

          echo ""
          echo "All patches applied successfully, zero rejects"

      - name: Integrate ReSukiSU
        run: |
          curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh | bash

      - name: Configure kernel
        run: |
          if [ "${{ github.event.inputs.arch }}" = "x64" ]; then
            cp configs/wsa/config-wsa-x64 .config
          else
            cp configs/wsa/config-wsa-arm64 .config
          fi

          scripts/config --enable KSU
          scripts/config --enable KSU_MANUAL_HOOK
          scripts/config --enable KSU_MANUAL_HOOK_AUTO_SETUID_HOOK
          scripts/config --enable KSU_MANUAL_HOOK_AUTO_INPUT_HOOK
          scripts/config --enable KSU_MANUAL_HOOK_AUTO_INITRC_HOOK
          scripts/config --disable KSU_TRACEPOINT_HOOK
          scripts/config --enable KALLSYMS_ALL

          yes "" | make olddefconfig

      - name: Verify config
        run: |
          grep "^CONFIG_KSU" .config || true
          grep "^CONFIG_KALLSYMS" .config || true

      - name: Show source info
        run: |
          git log --oneline -1
          make kernelversion

      - name: Build x64
        if: github.event.inputs.arch == 'x64'
        run: |
          make -j$(nproc) LLVM=1 bzImage

      - name: Build arm64
        if: github.event.inputs.arch == 'arm64'
        run: |
          make -j$(nproc) LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image

      - name: Upload x64
        if: github.event.inputs.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-5.15.104-x64-ReSukiSU
          path: arch/x86/boot/bzImage

      - name: Upload arm64
        if: github.event.inputs.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: Image-5.15.104-arm64-ReSukiSU
          path: arch/arm64/boot/Image

  release:
    if: github.event.inputs.create_release == 'true'
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: WSA-5.15.104-ReSukiSU-${{ github.run_number }}-${{ github.event.inputs.arch }}
          name: WSA Kernel 5.15.104 ReSukiSU (${{ github.event.inputs.arch }})
          files: release/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
